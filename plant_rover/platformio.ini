; PlatformIO Project Configuration for ESP32 WROOM Plant Rover
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor options
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Lib dependencies
lib_deps =
    ; WebSocket library
    links2004/WebSockets
    ; Servo control for ESP32 (corrected URL)
    https://github.com/joshua-earl/ESP32Servo.git
    ; JSON parsing
    bblanchon/ArduinoJson@^6.21.3

; Build options
build_flags =
    -D CORE_DEBUG_LEVEL=3
    ; Reserve extra PROGMEM space for HTML
    -DBOARD_HAS_PSRAM

; Upload options
upload_speed = 921600
