; PlatformIO Project Configuration for ESP32-CAM (AiThinker)
[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

; Use a specific partition scheme for camera apps
; (more app space, less spiffs)
board_build.partitions = huge_app.csv

; Serial Monitor options
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Camera driver (built-in to ESP32 Arduino framework)
; No external lib_deps needed for esp32-camera

; Upload options - adjust for your programmer
; For USB-Serial adapter: use standard upload
; For OTA-over-serial: keep as is
upload_speed = 921600

; Build flags
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM
    ; Enable camera PSRAM mode
    -D CONFIG_ESP32_SPIRAM_SUPPORT
